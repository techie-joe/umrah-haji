<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
</head>
<body>
    <form id="contact-form">
        <input type="hidden" name="subject" value="Permohonan Umrah Haji">
        <p>
            <label>Name</label><br>
            <input type="text" name="from_name">
        </p>
        <p>
            <label>Email</label><br>
            <input type="email" name="reply_to">
        </p>
        <p>
            <label>Message</label><br>
            <textarea name="content"></textarea>
        </p>
        <p>
            <input type="submit" value="Send">
        </p>
    </form>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){// https://dashboard.emailjs.com/admin/account
            emailjs.init({
              publicKey: "CxVt9eSTJeLY_Q8AX",
            });
        })();
        window.onload = function() {
            document.getElementById('contact-form').addEventListener('submit', function(event) {
                event.preventDefault();
                // these IDs from EJS dashboard
                emailjs.sendForm('service_001', 'det_001', this)
                    .then(() => {
                        console.log('SUCCESS!');
                    }, (error) => {
                        console.log('FAILED', error);
                    });
            });
        }
    </script>
</body>
</html>
